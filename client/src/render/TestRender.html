<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест игрового рендера</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #1e1e2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      color: #cdd6f4;
    }

    h1 {
      margin-bottom: 5px;
      font-size: 22px;
    }

    .canvas-border {
      border: 4px solid #45475a;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
    }

    canvas {
      display: block;
    }

    .instructions {
      margin-top: 15px;
      font-size: 14px;
      color: #a6adc8;
      text-align: center;
    }
    
    b {
      color: #f38ba8;
    }
  </style>
</head>
<body>

  <h1>Тестирование GameRender & Миникарты</h1>
  
  <div class="canvas-border">
    <!-- Главный холст игры 800х600 -->
    <canvas id="gameCanvas" width="800" height="600"></canvas>
  </div>

  <div class="instructions">
    Используйте стрелочки <b>← ↑ → ↓</b>, чтобы перемещаться по комнатам.<br>
    Посещенные комнаты будут навсегда заноситься в матрицу миникарты (в правом верхнем углу).
  </div>

  <!-- Подключение TypeScript файла-пускача (поддерживается Vite / Webpack) -->
  <script type="module" src="./test-runner.ts"></script>

</body>
</html>
