<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Русы против Ящеров: Roguelike</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="auth-screen" class="card">
        <h2>Вход в избу</h2>
        <form id="loginForm" onsubmit="return false;">
            <div class="input-group">
                <label for="username">Имя Руса (Логин)</label>
                <input type="text" id="username" placeholder="Введите логин" required>
            </div>
            <div class="input-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Введите пароль" required>
            </div>
            <button type="button" id="loginBtn" class="button button-primary">Войти в игру</button>
            <button type="button" id="registerBtn" class="button button-alt" style="margin-top: 10px;">Зарегистрироваться</button>
            <div id="errorText" class="error-message">Неверный логин или пароль</div>
        </form>
    </div>

    <div id="lobby-screen" class="lobby-container hidden">
        <header class="lobby-header">
            <h1 class="logo"> РУСЫ ПРОТИВ ЯЩЕРОВ: Roguelike</h1>
            <div class="header-stats">
                <button id="logoutBtn" class="button-logout" style="margin-bottom: 0;">ВЫЙТИ ИЗ ИЗБЫ</button>
                <span>МЕТА-ЗОЛОТО: <span id="lobbyGold" class="highlight">0G</span></span>
            </div>
        </header>
        <div class="lobby-grid">
            <aside class="panel left-panel">
                <h3 class="panel-title">ВЫБОР ГЕРОЯ</h3>
                <div id="heroCardList" class="hero-card-list">
                    <!-- Генерируется через TS -->
                </div>
                <h3 class="panel-title" style="margin-top: 25px;">СТАТИСТИКА</h3>
                <div class="stats-panel">
                    <p id="welcomeText" class="user-welcome">Загрузка имени...</p>
                </div>
            </aside>
            <main class="center-area">
                <section class="armory-panel">
                    <h3 class="panel-title">АРСЕНАЛ (СТАРТОВОЕ ОРУЖИЕ)</h3>
                    <div id="weaponCardList" class="weapon-grid">
                        <!-- Генерируется через TS -->
                    </div>
                </section>
                <div class="stage-scene">
                    <div id="heroPreviewSprite" class="hero-sprite-container">
                        <!-- Генерируется через TS (Сюда встанет КНОПКА КУПИТЬ вместо силуэта!) -->
                    </div>
                </div>
            </main>
            <aside class="panel right-panel">
                <h3 class="panel-title">НАСТРОЙКИ ЗАБЕГА</h3>
                <div class="section connection-section">
                    <label>ОДИНОЧНЫЙ ЗАБЕГ</label>
                    <button id="createRoomBtn" class="button button-alt" style="margin-top: 5px;">ИДТИ ОДНОМУ</button>
                    <div class="divider">ИЛИ</div>
                    <label>СЕТЕВОЙ ОТРЯД</label>
                    <button id="createLobbyBtn" class="button button-primary" style="margin-top: 5px; margin-bottom: 15px;">СТАТЬ ВОЕВОДОЙ</button>
                    <label for="sessionIdInput">ВСТУПИТЬ В ОТРЯД</label>
                    <input type="text" id="sessionIdInput" class="text-center" placeholder="ВСТАВЬТЕ ID СЕССИИ">
                    <button id="joinRoomBtn" class="button button-success">В БОЙ!</button>
                    <div id="lobbyError" class="error-message"></div>
                </div>
            </aside>
        </div>
    </div>
    <div id="game-screen" class="hidden">
        <div id="topBar">
            <div id="sessionContainer">Комната ID: <span id="sessionDisplay">Загрузка...</span></div>
            <button id="copySessionBtn" class="button button-primary copy-btn">СКОПИРОВАТЬ</button>
            <button id="startMatchBtn" class="button button-success hidden" style="width: auto; margin-right: 10px;">НАЧАТЬ ПОХОД</button>
            
            <!-- ШАГ 6: Кнопка успешного завершения забега (сохранение золота в БД) -->
            <button id="completeSessionBtn" class="button button-success hidden" style="width: auto; margin-right: 10px; background-color: #b8860b;">ЗАВЕРШИТЬ ПОХОД</button>
            
            <button id="disconnectBtn" class="button button-danger" style="width: auto;">Покинуть бой</button>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="gameHUD">
            <span>ЗОЛОТО: <span id="hudGold">0</span></span>
            <span>ОРУЖИЕ: <span id="hudWeapon">ЗАГРУЗКА...</span></span>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
