<!-- client/login.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Русы против Ящеров: Авторизация</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="card">
        <h2>Вход в Хаб</h2>
        <form id="loginForm" onsubmit="return false;">
            <div class="input-group">
                <label for="username">Имя Руса (Логин)</label>
                <input type="text" id="username" placeholder="Введите логин" required>
            </div>
            <div class="input-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit" id="loginBtn" class="btn btn-primary">Войти в игру</button>
            <div id="errorText" class="error-message">Неверный логин или пароль</div>
        </form>
    </div>
    <script type="module" src="/src/login.ts"></script>
</body>
</html>
